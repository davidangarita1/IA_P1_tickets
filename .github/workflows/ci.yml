name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test-and-typecheck:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install shared dependencies
        working-directory: backend/shared
        run: npm install

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install producer dependencies
        working-directory: backend/producer
        run: npm ci

      - name: Install consumer dependencies
        working-directory: backend/consumer
        run: npm ci

      - name: Test frontend
        working-directory: frontend
        run: npm test -- --passWithNoTests

      - name: Test producer
        working-directory: backend/producer
        run: npm test -- --passWithNoTests

      - name: Test consumer
        working-directory: backend/consumer
        run: npm test -- --passWithNoTests

      - name: Typecheck frontend
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Typecheck producer
        working-directory: backend/producer
        run: npx tsc --noEmit

      - name: Typecheck consumer
        working-directory: backend/consumer
        run: npx tsc --noEmit
